backend:
  name: git-gateway
  branch: main

media_folder: assets/images/uploads
public_folder: /assets/images/uploads

collections:
  - name: posts
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title,                 name: title,       widget: string }
      - { label: Publish Date,          name: date,        widget: datetime }
      - { label: Description (preview), name: description, widget: string,
          hint: "Short summary shown on blog cards. Keep under 160 characters." }
      - label: Category
        name: category
        widget: select
        options:
          - Corporate Insurance
          - Disability Insurance
          - Critical Illness
          - Life Insurance
          - Investments
          - Tax Planning
          - Business Owner Tips
          - Estate Planning
      - { label: Read Time,             name: read_time,   widget: string, default: "5 min read" }
      - { label: Body,                  name: body,        widget: markdown }
